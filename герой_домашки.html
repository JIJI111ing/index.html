<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>🌟 Герой Домашки — Смешарики</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Comic Sans MS','Chalkboard SE',cursive; background: #87CEEB; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 10px; }
.gw { background: linear-gradient(180deg, #87CEEB 0%, #B0E8FF 35%, #7EC850 70%, #5AAF30 100%); width: 100%; max-width: 480px; min-height: 640px; padding: 12px; border-radius: 22px; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
.cl { position: absolute; background: white; border-radius: 50px; opacity: 0.85; pointer-events:none; }
.title-bar { text-align: center; background: #fff; border-radius: 20px; padding: 8px 14px; margin-bottom: 10px; border: 4px solid #FF1493; }
.title-bar h1 { font-size: 20px; color: #FF1493; font-weight: 900; }
.stars-bar { display: flex; justify-content: space-between; align-items: center; background: #FFD700; border-radius: 14px; padding: 7px 12px; margin-bottom: 8px; border: 3px solid #FFA500; }
.total-stars { font-size: 15px; color: #7B3F00; font-weight: 900; }
.goal-btn { background: #FF1493; color: white; border: 3px solid #CC0066; border-radius: 12px; padding: 6px 13px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 900; }
.goal-btn:hover { background: #CC0066; }
.main-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.timer-block { background: #fff; border-radius: 18px; padding: 12px; text-align: center; border: 4px solid #00BFFF; }
.timer-display { font-size: 50px; font-weight: 900; color: #FF1493; line-height: 1; margin: 4px 0; text-shadow: 2px 2px 0 #FFD700; }
.timer-label { font-size: 12px; color: #555; margin-bottom: 6px; font-weight: 700; }
.time-btns { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 7px; }
.time-btn { background: #00BFFF; color: #003; border: 3px solid #0080CC; border-radius: 10px; padding: 5px 9px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 900; }
.time-btn:hover { background: #0095CC; color: white; }
.time-btn.active { background: #FF6600; color: white; border-color: #CC4400; }
.start-btn { background: #FF6600; color: white; border: 4px solid #CC3300; border-radius: 16px; padding: 11px 20px; font-size: 17px; cursor: pointer; font-family: inherit; font-weight: 900; width: 100%; margin-top: 4px; box-shadow: 0 5px 0 #AA2200; }
.start-btn:hover { background: #FF3300; }
.start-btn:active { box-shadow: 0 1px 0 #AA2200; transform: translateY(4px); }
.chars-block { background: #fff; border-radius: 18px; padding: 8px; border: 4px solid #7CFC00; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.char-svg { width: 108px; height: 108px; }
.char-name { font-size: 12px; font-weight: 900; color: #FF1493; margin-top: 3px; text-align: center; }
.motto { font-size: 16px; text-align: center; background: #FFFF00; border-radius: 14px; padding: 9px; margin-bottom: 8px; border: 4px solid #FFA500; color: #CC0000; font-weight: 900; min-height: 52px; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
.stickers-section { background: #fff; border-radius: 18px; padding: 10px; border: 4px solid #FF69B4; }
.stickers-title { font-size: 13px; font-weight: 900; color: #FF1493; margin-bottom: 7px; text-align: center; }
.stickers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.sticker { width: 100%; aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 3px dashed #ccc; background: #eee; opacity: 0.3; transition: all 0.4s; }
.sticker.earned { opacity: 1; border: 3px solid #FFD700; background: #FFFACD; box-shadow: 0 0 8px #FFD700; animation: pop 0.5s; }
@keyframes pop { 0%{transform:scale(0.4)} 70%{transform:scale(1.25)} 100%{transform:scale(1)} }
.result-overlay { display: none; position: absolute; inset: 0; background: rgba(255,255,200,0.98); border-radius: 22px; z-index: 10; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
.result-overlay.show { display: flex; }
.result-title { font-size: 26px; font-weight: 900; color: #FF1493; margin-bottom: 6px; }
.result-stars { font-size: 36px; margin: 6px 0; }
.result-msg { font-size: 17px; font-weight: 700; color: #FF6600; margin-bottom: 10px; }
.result-total { font-size: 13px; color: #555; margin-bottom: 12px; }
.new-sticker-label { font-size: 16px; font-weight: 900; color: #7B3F00; margin-bottom: 2px; }
.new-sticker { font-size: 60px; animation: pop 0.6s; margin: 2px 0 10px; }
.close-btn { background: #FF6600; color: white; border: 4px solid #CC3300; border-radius: 14px; padding: 10px 28px; font-size: 16px; cursor: pointer; font-family: inherit; font-weight: 900; }
.close-btn:hover { background: #CC3300; }
.goal-overlay { display: none; position: absolute; inset: 0; background: rgba(255,255,210,0.98); border-radius: 22px; z-index: 11; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
.goal-overlay.show { display: flex; }
.goal-title { font-size: 19px; font-weight: 900; color: #FF1493; margin-bottom: 10px; }
.goal-input { width: 100%; padding: 9px; border-radius: 12px; border: 3px solid #FF1493; font-size: 14px; font-family: inherit; margin-bottom: 7px; text-align: center; background: #FFF0F5; }
.star-goal-input { width: 100%; padding: 9px; border-radius: 12px; border: 3px solid #FFD700; font-size: 18px; font-family: inherit; text-align: center; margin-bottom: 10px; font-weight: 900; color: #FF6600; background: #FFFACD; }
.save-goal-btn { background: #FF1493; color: white; border: 3px solid #CC0066; border-radius: 14px; padding: 10px 28px; font-size: 16px; cursor: pointer; font-family: inherit; font-weight: 900; }
.cancel-goal-btn { margin-top: 8px; background: #aaa; color: white; border: 3px solid #888; border-radius: 12px; padding: 7px 20px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 700; }
.goal-display { font-size: 12px; font-weight: 700; color: #7B3F00; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.progress-bar-wrap { width: 100%; background: #ddd; border-radius: 8px; height: 11px; margin-bottom: 6px; border: 2px solid #aaa; }
.progress-bar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #FF1493, #FFD700, #00BFFF); transition: width 0.5s; }
</style>
</head>
<body>
<div class="gw" id="gameWrap">
  <div class="cl" style="width:90px;height:34px;top:6px;left:8px;"></div>
  <div class="cl" style="width:55px;height:22px;top:3px;left:70px;"></div>
  <div class="cl" style="width:65px;height:26px;top:16px;left:50px;"></div>
  <svg style="position:absolute;top:0;right:0;width:180px;height:100px;pointer-events:none" viewBox="0 0 180 100">
    <path d="M180,100 A120,120 0 0,0 0,100" fill="none" stroke="#FF0000" stroke-width="8" opacity="0.7"/>
    <path d="M170,100 A110,110 0 0,0 10,100" fill="none" stroke="#FF7700" stroke-width="8" opacity="0.7"/>
    <path d="M160,100 A100,100 0 0,0 20,100" fill="none" stroke="#FFFF00" stroke-width="8" opacity="0.7"/>
    <path d="M150,100 A90,90 0 0,0 30,100" fill="none" stroke="#00CC00" stroke-width="8" opacity="0.7"/>
    <path d="M140,100 A80,80 0 0,0 40,100" fill="none" stroke="#0000FF" stroke-width="8" opacity="0.7"/>
    <path d="M130,100 A70,70 0 0,0 50,100" fill="none" stroke="#8B00FF" stroke-width="8" opacity="0.7"/>
  </svg>

  <div class="title-bar"><h1>🌟 ГЕРОЙ ДОМАШКИ! 🌟</h1></div>

  <div class="stars-bar">
    <div class="total-stars">⭐ Звёзд: <span id="totalStars">0</span></div>
    <div style="display:flex;gap:6px;align-items:center">
      <span class="goal-display" id="goalDisplay"></span>
      <button class="goal-btn" onclick="openGoal()">🎯 Моя цель</button>
    </div>
  </div>
  <div class="progress-bar-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="main-area">
    <div class="timer-block">
      <div class="timer-label">⏱ Выбери время:</div>
      <div class="timer-display" id="timerDisp">00:00</div>
      <div class="time-btns">
        <button class="time-btn" onclick="setTime(2,this)">2 мин</button>
        <button class="time-btn" onclick="setTime(5,this)">5 мин</button>
        <button class="time-btn" onclick="setTime(10,this)">10 мин</button>
        <button class="time-btn" onclick="setTime(15,this)">15 мин</button>
        <button class="time-btn" onclick="setTime(20,this)">20 мин</button>
        <button class="time-btn" onclick="setTime(30,this)">30 мин</button>
        <button class="time-btn" onclick="setTime(45,this)">45 мин</button>
      </div>
      <button class="start-btn" id="startBtn" onclick="toggleTimer()">▶ СТАРТ!</button>
    </div>
    <div class="chars-block">
      <svg class="char-svg" id="charSvg" viewBox="0 0 110 110"></svg>
      <div class="char-name" id="charName">Крош болеет за тебя!</div>
    </div>
  </div>

  <div class="motto" id="mottoText">Выбери время и нажми СТАРТ! 🚀</div>

  <div class="stickers-section">
    <div class="stickers-title">🎨 Коллекция наклеек — собери все!</div>
    <div class="stickers-grid" id="stickersGrid"></div>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-title" id="resultTitle">🎉 УРА!</div>
    <div class="result-stars" id="resultStarsEarned"></div>
    <div class="new-sticker-label" id="newStickerLabel"></div>
    <div class="new-sticker" id="newStickerBig"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-total" id="resultTotal"></div>
    <button class="close-btn" onclick="closeResult()">🌟 Ещё раз!</button>
  </div>

  <div class="goal-overlay" id="goalOverlay">
    <div class="goal-title">🎯 Моя мечта и цель!</div>
    <input class="goal-input" id="goalText" placeholder="Стать отличником! 🏆" maxlength="40"/>
    <input class="star-goal-input" id="goalStars" type="number" placeholder="125" min="1" max="9999"/>
    <div style="font-size:12px;color:#888;margin-bottom:11px;">сколько ⭐ хочу набрать</div>
    <button class="save-goal-btn" onclick="saveGoal()">💾 Сохранить!</button>
    <button class="cancel-goal-btn" onclick="closeGoal()">Закрыть</button>
  </div>
</div>

let totalSeconds=0,remainSeconds=0,timerInterval=null,running=false;
let totalStars=0,stickersEarned=[],goalText='',goalStars=0;
let mottoInterval=null,charIdx=0;

function initChar(){
  document.getElementById('charSvg').innerHTML=CHARS[charIdx].html;
  document.getElementById('charName').textContent=CHARS[charIdx].name;
}
initChar();
setInterval(()=>{ charIdx=(charIdx+1)%CHARS.length; initChar(); },7000);

function buildGrid(){
  const g=document.getElementById('stickersGrid'); g.innerHTML='';
  for(let i=0;i<15;i++){
    const d=document.createElement('div');
    d.className='sticker'+(stickersEarned.includes(i)?' earned':'');
    d.textContent=STICKERS[i]; g.appendChild(d);
  }
}
buildGrid();

function setTime(m,btn){
  if(running)return;
  totalSeconds=m*60; remainSeconds=totalSeconds; updateDisp();
  document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function updateDisp(){
  const m=Math.floor(remainSeconds/60),s=remainSeconds%60;
  document.getElementById('timerDisp').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function toggleTimer(){
  if(!totalSeconds){document.getElementById('mottoText').textContent='Сначала выбери время! 👆';return;}
  if(running){
    clearInterval(timerInterval);clearInterval(mottoInterval);running=false;
    document.getElementById('startBtn').textContent='▶ ПРОДОЛЖИТЬ!';
    document.getElementById('mottoText').textContent='Пауза... Возвращайся скорее! ⏸';
  } else {
    running=true;
    document.getElementById('startBtn').textContent='⏸ ПАУЗА';
    let mi=Math.floor(Math.random()*MOTTOS_RUN.length);
    document.getElementById('mottoText').textContent=MOTTOS_RUN[mi];
    mottoInterval=setInterval(()=>{mi=(mi+1)%MOTTOS_RUN.length;document.getElementById('mottoText').textContent=MOTTOS_RUN[mi];},4000);
    timerInterval=setInterval(()=>{
      remainSeconds--; updateDisp();
      if(remainSeconds<=0){clearInterval(timerInterval);clearInterval(mottoInterval);running=false;showResult();}
    },1000);
  }
}
function starsFor(sec){
  const m=sec/60;
  if(m<=2)return 5;if(m<=5)return 8;if(m<=10)return 12;
  if(m<=15)return 16;if(m<=20)return 20;if(m<=30)return 25;
  if(m<=45)return 35;return 50;
}
function showResult(){
  const e=starsFor(totalSeconds);totalStars+=e;
  document.getElementById('totalStars').textContent=totalStars;
  let ns=null;
  const un=STICKERS.map((_,i)=>i).filter(i=>!stickersEarned.includes(i));
  if(un.length>0){stickersEarned.push(un[0]);ns=STICKERS[un[0]];}
  buildGrid();updateProgress();
  const msg=MOTTOS_DONE[Math.floor(Math.random()*MOTTOS_DONE.length)];
  document.getElementById('resultTitle').textContent=msg;
  document.getElementById('resultStarsEarned').textContent='⭐'.repeat(Math.min(e,12))+(e>12?'...':'');
  document.getElementById('resultMsg').textContent='Заработано: '+e+' звёзд!';
  document.getElementById('newStickerLabel').textContent=ns?'Новая наклейка в коллекцию:':'🎉 Коллекция полная!';
  document.getElementById('newStickerBig').textContent=ns||'';
  document.getElementById('resultTotal').textContent='Всего звёзд: '+totalStars+(goalStars?' из '+goalStars:'');
  document.getElementById('mottoText').textContent=msg;
  document.getElementById('resultOverlay').classList.add('show');
}
function closeResult(){
  document.getElementById('resultOverlay').classList.remove('show');
  remainSeconds=totalSeconds;updateDisp();
  document.getElementById('startBtn').textContent='▶ СТАРТ!';
  document.getElementById('mottoText').textContent='Нажми СТАРТ чтобы начать снова! 🚀';
}
function openGoal(){document.getElementById('goalText').value=goalText;document.getElementById('goalStars').value=goalStars||'';document.getElementById('goalOverlay').classList.add('show');}
function closeGoal(){document.getElementById('goalOverlay').classList.remove('show');}
function saveGoal(){
  goalText=document.getElementById('goalText').value.trim();
  goalStars=parseInt(document.getElementById('goalStars').value)||0;
  document.getElementById('goalDisplay').textContent=(goalText?goalText+' ':'')+(goalStars?'('+goalStars+'⭐)':'');
  updateProgress();closeGoal();
}
function updateProgress(){
  const w=document.getElementById('progressWrap'),b=document.getElementById('progressBar');
  if(goalStars>0){w.style.display='block';b.style.width=Math.min(100,Math.round(totalStars/goalStars*100))+'%';}
  else w.style.display='none';
}
</script>
